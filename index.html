<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="particles"></canvas>

<!-- Музыка -->
<audio autoplay loop id="music">
<source src="msc/music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<header>
<h1 class="title">С 8 Марта 🌸</h1>
<p class="subtitle">Листай поздравления →</p>
</header>

<div class="slider">

<div class="slide active">
<img src="img/b.png">
<div class="message">
Ты самая прекрасная 🌷
</div>
</div>

<div class="slide">
<img src="img/g.jpg">
<div class="message">
Пусть каждый день будет наполнен счастьем
</div>
</div>

<div class="slide">
<div class="message big">
С праздником! 💐
</div>
</div>

</div>

<div class="controls">
<button id="prev">←</button>
<button id="next">→</button>
</div>

<div class="final">
<button id="openLetter">Открыть письмо ✉</button>
</div>

<div class="letter hidden" id="letter">

<div class="letterContent">

<button class="closeLetter" id="closeLetter">← Назад</button>

<h2>С 8 Марта!</h2>

<p>
Пусть каждый день приносит радость,  
улыбки и вдохновение.  
Ты делаешь этот мир красивее.
</p>

</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
